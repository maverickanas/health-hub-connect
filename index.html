<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Healthy Hub — Track fitness, food & AI coaching</title>
    <meta name="description" content="Healthy Hub: track steps, workouts, nutrition and get AI health coaching in one premium OLED app." />
    <meta name="author" content="Healthy Hub" />

    <!-- App-like behavior for WebView / PWA wrappers -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Healthy Hub" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#050505" />

    <meta property="og:title" content="Healthy Hub" />
    <meta property="og:description" content="Track fitness, food and AI coaching in one premium app." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://healthyhubapp.lovable.app" />
    <link rel="canonical" href="https://healthyhubapp.lovable.app" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
